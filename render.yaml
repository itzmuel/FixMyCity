services:
  - type: web
    name: fixmycity-moderation
    runtime: node
    rootDir: moderation-server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
